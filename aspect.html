<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Liquid Glass | Metaball Refraction</title>
    <style>
        :root {
            --primary: #050a10;
            --secondary: #0d1f33;
            --accent: #00b4d8;
            --accent-light: #90e0ef;
            --text: #e0e6ed;
            --text-muted: #8b95a5;
            --white: #ffffff;
            --gradient: linear-gradient(135deg, #050a10 0%, #0d1f33 50%, #071424 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: var(--primary);
            font-family: 'Space Grotesk', sans-serif;
        }

        #app {
            width: 100%;
            height: 100%;
            position: relative;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            font: 12px/1.4 'Space Grotesk', sans-serif;
            color: rgba(255, 255, 255, 0.25);
            pointer-events: none;
            text-align: center;
            user-select: none;
            letter-spacing: 0.04em;
            z-index: 10;
        }

        /* Dynamic titles overlay */
        .titles-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.4) 100%);
        }

        .main-title-dynamic {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 800;
            font-size: clamp(2rem, 8vw, 5rem);
            letter-spacing: -0.02em;
            color: var(--white);
            margin-bottom: 1rem;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 30px rgba(0, 180, 216, 0.4);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            background: linear-gradient(135deg, var(--white) 0%, var(--accent-light) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle-dynamic {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 400;
            font-size: clamp(0.9rem, 3vw, 1.3rem);
            color: var(--white);
            letter-spacing: 0.1em;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 15px rgba(0, 180, 216, 0.3);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            opacity: 0.9;
        }

        /* Typing effect styles */
        .typing-text {
            display: inline-block;
        }

        .char {
            display: inline-block;
            opacity: 1;
            animation: none;
        }

        /* Animación solo para nuevos caracteres que aparecen */
        @keyframes charAppear {
            from {
                opacity: 0;
                transform: scale(0.5) rotateY(90deg);
                filter: blur(6px);
            }
            to {
                opacity: 1;
                transform: scale(1) rotateY(0deg);
                filter: blur(0);
            }
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            margin-left: 6px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
            border-radius: 2px;
            box-shadow: 0 0 8px var(--accent);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--accent); }
            50% { opacity: 0.3; box-shadow: 0 0 2px var(--accent); }
        }

        /* Transiciones suaves */
        .main-title-dynamic, .subtitle-dynamic {
            transition: opacity 0.5s ease-out, transform 0.5s ease-out;
        }

        /* Línea decorativa brillante */
        .glow-line {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--accent-light), transparent);
            margin: 1rem auto;
            border-radius: 2px;
            animation: pulseGlow 3s infinite;
            box-shadow: 0 0 10px var(--accent);
        }

        @keyframes pulseGlow {
            0%, 100% { width: 80px; opacity: 0.5; box-shadow: 0 0 5px var(--accent); }
            50% { width: 120px; opacity: 1; box-shadow: 0 0 20px var(--accent); }
        }

        /* Efecto de brillo en el overlay */
        .titles-overlay::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200%;
            height: 200%;
            transform: translate(-50%, -50%);
            background: radial-gradient(ellipse at center, rgba(0, 180, 216, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    
    <!-- Overlay para títulos dinámicos -->
    <div class="titles-overlay">
        <div class="main-title-dynamic" id="mainTitleDynamic">
            Marketing Digital
        </div>
        <div class="glow-line"></div>
        <div class="subtitle-dynamic" id="subtitleDynamic">
            Transformamos tu marca
        </div>
    </div>
    
    <div class="info">drag to interact &middot; click to spawn</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.1/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from "three";

        /* ================================================================
           Liquid Glass  –  metaball refraction over typography
           ================================================================ */

        /* ── Constants ──────────────────────────────────────────── */
        const MAX_DROPLETS = 40;
        const FIXED_DT_MS = 8;
        const MAX_FRAME_DT_MS = 100;
        const MAX_CATCHUP = 6;

        /* ── Renderer ───────────────────────────────────────────── */
        const app = document.getElementById("app");
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setPixelRatio(Math.min(2, devicePixelRatio || 1));
        renderer.setSize(innerWidth, innerHeight);
        app.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        /* ── Background typography texture ── */
        const bgCanvas = document.createElement("canvas");
        const bgCtx = bgCanvas.getContext("2d");
        const bgTexture = new THREE.CanvasTexture(bgCanvas);
        bgTexture.minFilter = THREE.LinearFilter;
        bgTexture.magFilter = THREE.LinearFilter;

        function drawBackground() {
            const w = renderer.domElement.width;
            const h = renderer.domElement.height;
            bgCanvas.width = w;
            bgCanvas.height = h;

            /* gradient background usando paleta de colores */
            const grd = bgCtx.createLinearGradient(0, 0, w * 0.6, h);
            grd.addColorStop(0, "#050a10");
            grd.addColorStop(0.35, "#0d1f33");
            grd.addColorStop(0.6, "#071424");
            grd.addColorStop(1, "#050a10");
            bgCtx.fillStyle = grd;
            bgCtx.fillRect(0, 0, w, h);

            /* decorative colour waves con acento */
            bgCtx.save();
            bgCtx.globalAlpha = 0.15;
            for (let i = 0; i < 5; i++) {
                const cx = w * (0.2 + i * 0.18);
                const cy = h * (0.3 + Math.sin(i * 1.3) * 0.25);
                const rg = bgCtx.createRadialGradient(cx, cy, 0, cx, cy, w * 0.35);
                rg.addColorStop(0, `rgba(0, 180, 216, 0.3)`);
                rg.addColorStop(1, `rgba(0, 180, 216, 0)`);
                bgCtx.fillStyle = rg;
                bgCtx.fillRect(0, 0, w, h);
            }
            bgCtx.restore();

            /* scattered small text */
            const words = [
                "creativity",
                "innovation",
                "digital",
                "future",
                "design",
                "technology",
                "vision",
                "modern",
                "evolution",
            ];
            bgCtx.fillStyle = "rgba(255, 255, 255, 0.03)";
            const scatterSize = Math.round(w * 0.018);
            bgCtx.font = `500 ${scatterSize}px 'Space Grotesk', sans-serif`;
            for (let i = 0; i < words.length; i++) {
                bgCtx.fillText(
                    words[i],
                    w * (0.12 + (i % 4) * 0.25),
                    h * (0.08 + Math.floor(i / 4) * 0.35 + (i % 3) * 0.12),
                );
            }

            bgTexture.needsUpdate = true;
        }

        document.fonts.ready.then(() => {
            drawBackground();
        });
        drawBackground();

        /* ── Droplet data ─────────── */
        const MAX_ENTRIES = MAX_DROPLETS * 2;
        const dropletBuf = new Float32Array(MAX_ENTRIES * 4);
        const dropletTex = new THREE.DataTexture(
            dropletBuf,
            MAX_ENTRIES,
            1,
            THREE.RGBAFormat,
            THREE.FloatType,
        );
        dropletTex.minFilter = THREE.NearestFilter;
        dropletTex.magFilter = THREE.NearestFilter;
        dropletTex.needsUpdate = true;

        let drops = [];
        let uid = 0;

        function spawn(x, y, r, vx = 0, vy = 0) {
            if (drops.length >= MAX_DROPLETS) return null;
            const area = Math.PI * r * r;
            const angle = Math.random() * Math.PI * 2;
            const spd = 0.0003 + Math.random() * 0.0008;
            const d = {
                id: uid++,
                x,
                y,
                r,
                area,
                vx: vx || Math.cos(angle) * spd,
                vy: vy || Math.sin(angle) * spd,
                alive: true,
                wanderAngle: Math.random() * Math.PI * 2,
                wanderSpeed: 0.3 + Math.random() * 0.5,
                softPrevX: x,
                softPrevY: y,
                softOffX: 0,
                softOffY: 0,
                softVelX: 0,
                softVelY: 0,
            };
            drops.push(d);
            return d;
        }

        for (let i = 0; i < 12; i++) {
            spawn(
                (Math.random() - 0.5) * 0.7,
                (Math.random() - 0.5) * 0.5,
                0.03 + Math.random() * 0.05,
            );
        }

        /* ── Shader ────────────────────────────────── */
        const vertSrc = `void main(){ gl_Position = vec4(position, 1.0); }`;

        const fragSrc = `
        precision highp float;
        #define MAX_N ${MAX_ENTRIES}

        uniform vec2      uRes;
        uniform sampler2D uData;
        uniform sampler2D uBg;
        uniform int       uCount;
        uniform float     uTime;

        void main(){
            vec2  uv  = gl_FragCoord.xy / uRes;
            float asp = uRes.x / uRes.y;
            vec2  p   = (uv - 0.5) * vec2(asp, 1.0);

            float field = 0.0;
            vec2  grad  = vec2(0.0);
            vec2  lens  = vec2(0.0);
            float lensW = 0.0;

            for(int i = 0; i < MAX_N; i++){
                if(i >= uCount) break;
                vec4  d = texture2D(uData, vec2((float(i)+0.5)/float(MAX_N), 0.5));
                vec2  c = d.xy;
                float r = d.z;
                if(r < 0.001) continue;
                vec2  delta = p - c;
                float dSq   = dot(delta, delta) + 1e-5;
                float contrib = r * r / dSq;
                field += contrib;
                grad  += -2.0 * contrib / dSq * delta;

                float w = r * r / (dSq + r * r);
                lens += (c - p) * w;
                lensW += w;
            }

            lens /= (lensW + 0.001);
            float lensLen = length(lens);

            float thr  = 1.0;
            float edge = smoothstep(thr - 0.08, thr + 0.03, field);

            float refractStrength = 0.035;
            float mappedLens = atan(lensLen * 6.0) * refractStrength;
            vec2  refractDir = (lensLen > 1e-5) ? lens / lensLen : vec2(0.0);
            float refractMask = smoothstep(thr - 0.2, thr + 1.5, field);
            vec2  refractedUV = clamp(uv + refractDir * mappedLens * refractMask, 0.001, 0.999);

            vec3  bgClean = texture2D(uBg, uv).rgb;

            float gradLen = length(grad);
            float nScale = atan(gradLen * 0.5) * 0.3;
            vec2  nGrad  = (gradLen > 1e-4) ? (grad / gradLen) * nScale : vec2(0.0);
            vec3  N = normalize(vec3(-nGrad, 1.0));
            vec3  L = normalize(vec3(0.3, 0.6, 1.0));
            vec3  V = vec3(0.0, 0.0, 1.0);
            vec3  H = normalize(L + V);
            float diff = max(dot(N, L), 0.0);
            float spec = pow(max(dot(N, H), 0.0), 180.0);

            float cosTheta = max(dot(N, V), 0.0);
            float fresnel  = 0.04 + 0.96 * pow(1.0 - cosTheta, 4.0);

            float rim = smoothstep(thr + 0.6, thr, field) * edge;

            float caStr = 0.0018 * edge;
            vec3 bgCA;
            bgCA.r = texture2D(uBg, refractedUV + vec2(caStr, caStr * 0.5)).r;
            bgCA.g = texture2D(uBg, refractedUV).g;
            bgCA.b = texture2D(uBg, refractedUV - vec2(caStr, caStr * 0.5)).b;

            float depth = smoothstep(thr, thr + 3.0, field);
            vec3  tint  = mix(vec3(1.0), vec3(0.0, 0.5, 0.85), depth * 0.45);

            vec3 glassColor = bgCA * tint * (0.92 + 0.08 * diff)
                            + vec3(1.0) * spec * 0.85
                            + vec3(0.0, 0.7, 0.9) * rim * 0.22
                            + vec3(1.0) * fresnel * 0.10;

            float shadowField = smoothstep(thr - 0.35, thr - 0.05, field);
            vec3 bg = bgClean * (1.0 - shadowField * 0.06);

            float borderOuter = smoothstep(thr - 0.10, thr - 0.01, field);
            float borderInner = smoothstep(thr + 0.0, thr + 0.06, field);
            float border = borderOuter * (1.0 - borderInner) * 0.28;

            vec3  col = mix(bg, glassColor, edge);
            col += vec3(1.0) * border;

            gl_FragColor = vec4(col, 1.0);
        }
        `;

        const mat = new THREE.ShaderMaterial({
            vertexShader: vertSrc,
            fragmentShader: fragSrc,
            uniforms: {
                uRes: { value: new THREE.Vector2(renderer.domElement.width, renderer.domElement.height) },
                uData: { value: dropletTex },
                uBg: { value: bgTexture },
                uCount: { value: 0 },
                uTime: { value: 0 },
            },
        });
        scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), mat));

        /* ── Input ──────────────────────────────────────────────── */
        let aspect = innerWidth / innerHeight;
        const mouse = { x: 999, y: 999, active: false, down: false };
        let spawnCD = 0;

        renderer.domElement.addEventListener("pointermove", (e) => {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((e.clientX - rect.left) / rect.width - 0.5) * aspect;
            mouse.y = 0.5 - (e.clientY - rect.top) / rect.height;
            mouse.active = true;
        });
        renderer.domElement.addEventListener("pointerdown", () => { mouse.down = true; });
        renderer.domElement.addEventListener("pointerup", () => { mouse.down = false; });
        renderer.domElement.addEventListener("pointerleave", () => { mouse.active = false; mouse.down = false; });

        window.addEventListener("resize", () => {
            renderer.setSize(innerWidth, innerHeight);
            renderer.setPixelRatio(Math.min(2, devicePixelRatio || 1));
            aspect = innerWidth / innerHeight;
            mat.uniforms.uRes.value.set(renderer.domElement.width, renderer.domElement.height);
            drawBackground();
        });

        /* ── Physics ─────────────────────────────────── */
        const DAMP = 0.993;
        const MOUSE_R = 0.18;
        const MOUSE_F = 0.004;
        const TENSION_RANGE = 0.12;
        const TENSION_F = 0.0004;
        const MERGE_RATIO = 0.62;
        const SPLIT_SPEED = 0.013;
        const SPLIT_MIN_R = 0.04;
        const MAX_SPEED = 0.015;
        const BOUNCE = 0.4;
        const WANDER_F = 0.00004;
        const CENTER_PULL = 0.000008;

        function applyForces(time) {
            for (const d of drops) {
                d.wanderAngle += (Math.random() - 0.5) * d.wanderSpeed;
                d.vx += Math.cos(d.wanderAngle) * WANDER_F;
                d.vy += Math.sin(d.wanderAngle) * WANDER_F;
                d.vx -= d.x * CENTER_PULL;
                d.vy -= d.y * CENTER_PULL;

                if (mouse.active) {
                    const dx = d.x - mouse.x;
                    const dy = d.y - mouse.y;
                    const dSq = dx * dx + dy * dy;
                    const rr = MOUSE_R + d.r;
                    if (dSq < rr * rr && dSq > 1e-5) {
                        const dist = Math.sqrt(dSq);
                        const s = 1 - dist / rr;
                        const f = s * s * MOUSE_F;
                        d.vx += (dx / dist) * f;
                        d.vy += (dy / dist) * f;
                    }
                }
            }

            for (let i = 0; i < drops.length; i++) {
                const a = drops[i];
                for (let j = i + 1; j < drops.length; j++) {
                    const b = drops[j];
                    const dx = b.x - a.x;
                    const dy = b.y - a.y;
                    const dSq = dx * dx + dy * dy;
                    const rng = TENSION_RANGE + a.r + b.r;
                    if (dSq < rng * rng && dSq > 1e-5) {
                        const dist = Math.sqrt(dSq);
                        const s = 1 - dist / rng;
                        const f = s * TENSION_F;
                        const fx = (dx / dist) * f;
                        const fy = (dy / dist) * f;
                        a.vx += fx;
                        a.vy += fy;
                        b.vx -= fx;
                        b.vy -= fy;
                    }
                }
            }
        }

        function integrate() {
            for (const d of drops) {
                const sp = Math.sqrt(d.vx * d.vx + d.vy * d.vy);
                if (sp > MAX_SPEED) {
                    const s = MAX_SPEED / sp;
                    d.vx *= s;
                    d.vy *= s;
                }
                d.x += d.vx;
                d.y += d.vy;
                d.vx *= DAMP;
                d.vy *= DAMP;

                const wx = aspect * 0.5;
                const wy = 0.5;
                if (d.x - d.r < -wx) { d.x = -wx + d.r; d.vx = Math.abs(d.vx) * BOUNCE; }
                if (d.x + d.r > wx) { d.x = wx - d.r; d.vx = -Math.abs(d.vx) * BOUNCE; }
                if (d.y - d.r < -wy) { d.y = -wy + d.r; d.vy = Math.abs(d.vy) * BOUNCE; }
                if (d.y + d.r > wy) { d.y = wy - d.r; d.vy = -Math.abs(d.vy) * BOUNCE; }
            }
        }

        function mergeDroplets() {
            for (let i = 0; i < drops.length; i++) {
                const a = drops[i];
                if (!a.alive) continue;
                for (let j = i + 1; j < drops.length; j++) {
                    const b = drops[j];
                    if (!b.alive) continue;
                    const dx = b.x - a.x;
                    const dy = b.y - a.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < (a.r + b.r) * MERGE_RATIO) {
                        const na = a.area + b.area;
                        a.x = (a.x * a.area + b.x * b.area) / na;
                        a.y = (a.y * a.area + b.y * b.area) / na;
                        a.vx = (a.vx * a.area + b.vx * b.area) / na;
                        a.vy = (a.vy * a.area + b.vy * b.area) / na;
                        a.r = Math.sqrt(na / Math.PI);
                        a.area = na;
                        b.alive = false;
                    }
                }
            }
            drops = drops.filter(d => d.alive);
        }

        function splitDroplets() {
            const add = [];
            for (const d of drops) {
                if (d.r < SPLIT_MIN_R) continue;
                const sp = Math.sqrt(d.vx * d.vx + d.vy * d.vy);
                if (sp < SPLIT_SPEED) continue;

                const ha = d.area * 0.5;
                const nr = Math.sqrt(ha / Math.PI);
                const nx = -d.vy / sp;
                const ny = d.vx / sp;
                const off = nr * 0.7;

                d.r = nr;
                d.area = ha;
                d.x -= nx * off;
                d.y -= ny * off;

                add.push({
                    id: uid++, x: d.x + nx * off * 2, y: d.y + ny * off * 2, r: nr, area: ha,
                    vx: d.vx + nx * sp * 0.35, vy: d.vy + ny * sp * 0.35, alive: true,
                    wanderAngle: Math.random() * Math.PI * 2, wanderSpeed: 0.3 + Math.random() * 0.5,
                    softPrevX: d.x + nx * off * 2, softPrevY: d.y + ny * off * 2,
                    softOffX: 0, softOffY: 0, softVelX: 0, softVelY: 0,
                });
            }
            for (const a of add) if (drops.length < MAX_DROPLETS) drops.push(a);
        }

        let autoTimer = 0;
        function autoSpawn() {
            autoTimer += FIXED_DT_MS;
            if (autoTimer > 2000 && drops.length < 10) {
                autoTimer = 0;
                spawn((Math.random() - 0.5) * aspect * 0.6, (Math.random() - 0.5) * 0.6, 0.025 + Math.random() * 0.03);
            }
        }

        function mouseSpawn() {
            if (!mouse.down || !mouse.active) return;
            spawnCD -= FIXED_DT_MS;
            if (spawnCD <= 0 && drops.length < MAX_DROPLETS) {
                spawnCD = 120;
                spawn(mouse.x + (Math.random() - 0.5) * 0.02, mouse.y + (Math.random() - 0.5) * 0.02, 0.02 + Math.random() * 0.015);
            }
        }

        const SOFT_STIFFNESS = 0.22;
        const SOFT_DAMPING = 0.6;

        function updateSoftBodies() {
            for (const d of drops) {
                const dx = d.x - d.softPrevX;
                const dy = d.y - d.softPrevY;
                d.softVelX += (dx - d.softOffX) * SOFT_STIFFNESS;
                d.softVelY += (dy - d.softOffY) * SOFT_STIFFNESS;
                d.softVelX *= SOFT_DAMPING;
                d.softVelY *= SOFT_DAMPING;
                d.softOffX += d.softVelX;
                d.softOffY += d.softVelY;
                d.softPrevX = d.x;
                d.softPrevY = d.y;
            }
        }

        let simTime = 0;
        function fixedUpdate() {
            simTime += FIXED_DT_MS;
            applyForces(simTime);
            integrate();
            mergeDroplets();
            splitDroplets();
            updateSoftBodies();
            autoSpawn();
            mouseSpawn();
        }

        function sync() {
            dropletBuf.fill(0);
            const n = Math.min(drops.length, MAX_DROPLETS);
            for (let i = 0; i < n; i++) {
                const d = drops[i];
                dropletBuf[i * 4] = d.x;
                dropletBuf[i * 4 + 1] = d.y;
                dropletBuf[i * 4 + 2] = d.r;
                dropletBuf[i * 4 + 3] = 1;

                const ghostScale = 0.7;
                const trailStr = 3.5;
                const gi = (n + i) * 4;
                dropletBuf[gi] = d.x - d.softOffX * trailStr;
                dropletBuf[gi + 1] = d.y - d.softOffY * trailStr;
                dropletBuf[gi + 2] = d.r * ghostScale;
                dropletBuf[gi + 3] = 1;
            }
            dropletTex.needsUpdate = true;
            mat.uniforms.uCount.value = n * 2;
        }

        /* ================================================================
           DYNAMIC TITLES - Corregido: todos los títulos visibles
           ================================================================ */
        
        const titlesData = [
            { main: "Marketing Digital", subtitle: "Transformamos tu marca" },
            { main: "Estrategias 3D", subtitle: "Innovación y resultados" },
            { main: "Branding Creativo", subtitle: "Presencia digital" },
            { main: "Social Media", subtitle: "Engagement real" },
            { main: "Growth Hacking", subtitle: "Crecimiento exponencial" },
            { main: "Content Marketing", subtitle: "Impacto medible" }
        ];

        let currentTitleIndex = 0;
        let isAnimating = false;
        const displayDuration = 4000; // 4 segundos visibles antes de cambiar

        const mainContainer = document.getElementById('mainTitleDynamic');
        const subContainer = document.getElementById('subtitleDynamic');

        function changeTitle() {
            if (isAnimating) return;
            isAnimating = true;
            
            const nextIndex = (currentTitleIndex + 1) % titlesData.length;
            
            // Animación de salida
            mainContainer.style.opacity = '0';
            mainContainer.style.transform = 'translateY(-30px)';
            subContainer.style.opacity = '0';
            subContainer.style.transform = 'translateY(-20px)';
            
            setTimeout(() => {
                // Cambiar el texto
                mainContainer.textContent = titlesData[nextIndex].main;
                subContainer.textContent = titlesData[nextIndex].subtitle;
                
                // Animación de entrada
                mainContainer.style.opacity = '1';
                mainContainer.style.transform = 'translateY(0)';
                subContainer.style.opacity = '1';
                subContainer.style.transform = 'translateY(0)';
                
                currentTitleIndex = nextIndex;
                isAnimating = false;
            }, 500);
        }
        
        // Cambiar título cada 4 segundos
        setInterval(() => {
            changeTitle();
        }, displayDuration);

        /* ── Main loop ──────────────────────────────────────────── */
        let last = performance.now();
        let acc = 0;
        let paused = false;

        document.addEventListener("visibilitychange", () => {
            paused = document.hidden;
            if (!paused) last = performance.now();
        });

        (function loop() {
            if (paused) {
                requestAnimationFrame(loop);
                return;
            }
            const now = performance.now();
            const dt = Math.min(now - last, MAX_FRAME_DT_MS);
            last = now;
            acc += dt;

            let g = 0;
            while (acc >= FIXED_DT_MS && g < MAX_CATCHUP) {
                fixedUpdate();
                acc -= FIXED_DT_MS;
                g++;
            }
            if (g >= MAX_CATCHUP) acc = 0;

            mat.uniforms.uTime.value = now * 0.001;
            sync();
            renderer.render(scene, camera);
            requestAnimationFrame(loop);
        })();
    </script>
</body>
</html>
