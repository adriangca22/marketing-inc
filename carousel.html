<!-- ============================================ -->
<!-- COMPONENTE: Galería de Arte Moderna          -->
<!-- SCROLL CONTINUO + FLECHAS SINCRONIZADAS     -->
<!-- AUTO-SCROLL ACTIVO FORZADO DESDE EL INICIO  -->
<!-- ============================================ -->

<!-- Font Awesome CDN -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<div class="glr-gallery-container">
    <div class="glr-gallery-header">
        <h1 class="glr-main-title">
            <i class="fa-solid fa-palette glr-title-icon"></i>
            <span class="glr-title-text">diseño gráfico, branding, logos</span>
        </h1>
        <div class="glr-title-divider">
            <span class="glr-divider-line"></span>
            <span class="glr-divider-diamond"><i class="fa-solid fa-diamond"></i></span>
            <span class="glr-divider-line"></span>
        </div>
        <p class="glr-subtitle">Clic en cualquier imagen para vista completa</p>
    </div>
    
    <div class="glr-gallery-track" id="glr-galleryTrack">
        <!-- Las imágenes se generarán con JavaScript -->
    </div>

    <!-- FLECHAS CENTRALES - MINIMALISTAS CON GLOW -->
    <div class="glr-nav-arrows">
        <button class="glr-arrow-btn glr-arrow-prev" id="glr-prevBtn">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
        <button class="glr-arrow-btn glr-arrow-next" id="glr-nextBtn">  
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </button>
    </div>

    <div class="glr-slide-counter">
        <span id="glr-currentIdx">01</span> / <span id="glr-totalSlides">11</span>
    </div>
</div>

<!-- CSS AISLADO DE LA GALERÍA -->
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Reset solo dentro de la galería */
.glr-gallery-container * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

.glr-gallery-container {
    position: relative;
    width: 100%;
    height: 100vh;
    min-height: 800px;
    overflow: hidden;
    font-family: 'Lato', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, rgba(88, 28, 135, 0.15) 0%, rgba(15, 5, 30, 0.95) 100%),
                url('img/fondo.png') no-repeat center center;
    background-size: cover;
    background-attachment: fixed;
}

/* ============================================ */
/* HEADER CON TÍTULO CENTRADO Y EFECTOS PRO    */
/* ============================================ */
.glr-gallery-header {
    position: absolute;
    top: 25px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 100;
    padding: 0 20px;
    animation: glr-header-entrance 1s ease-out forwards;
}

@keyframes glr-header-entrance {
    0% {
        opacity: 0;
        transform: translateY(-30px);
    }
    100% {
        opacity: 1;
        transform: translateY(0);
    }
}

.glr-main-title {
    font-family: 'Playfair Display', 'Georgia', serif;
    font-size: 1.9rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 0;
    margin-bottom: 6px;
    display: inline-flex;
    align-items: center;
    gap: 15px;
    color: #ffffff; /* Color de respaldo para que nunca desaparezca */
    position: relative;
}

/* Icono del título con efectos */
.glr-title-icon {
    font-size: 1.5rem;
    background: linear-gradient(135deg, #ff6bb5, #a02078, #d478b0);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 10px rgba(160, 32, 120, 0.8));
    animation: glr-icon-pulse 2.5s ease-in-out infinite;
}

@keyframes glr-icon-pulse {
    0%, 100% {
        filter: drop-shadow(0 0 10px rgba(160, 32, 120, 0.8));
        transform: scale(1) rotate(0deg);
    }
    50% {
        filter: drop-shadow(0 0 20px rgba(255, 107, 181, 1)) drop-shadow(0 0 30px rgba(160, 32, 120, 0.6));
        transform: scale(1.1) rotate(5deg);
    }
}

/* Texto del título con efecto de brillo deslizante */
.glr-title-text {
    background: linear-gradient(
        90deg,
        #ffffff 0%,
        #ffffff 35%,
        #f0c0e8 45%,
        #d478b0 50%,
        #f0c0e8 55%,
        #ffffff 65%,
        #ffffff 100%
    );
    background-size: 300% 100%;
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: glr-shine-effect 5s ease-in-out infinite;
    filter: drop-shadow(0 2px 8px rgba(160, 32, 120, 0.3));
}

/* Animación de brillo deslizante para el título */
@keyframes glr-shine-effect {
    0% {
        background-position: 300% center;
    }
    100% {
        background-position: -300% center;
    }
}

/* Línea decorativa entre título y subtítulo */
.glr-title-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 8px;
    animation: glr-divider-appear 1.2s ease-out 0.3s both;
}

@keyframes glr-divider-appear {
    0% {
        opacity: 0;
        transform: scaleX(0);
    }
    100% {
        opacity: 1;
        transform: scaleX(1);
    }
}

.glr-divider-line {
    display: inline-block;
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(160, 32, 120, 0.8), transparent);
    animation: glr-line-glow 3s ease-in-out infinite;
}

@keyframes glr-line-glow {
    0%, 100% {
        opacity: 0.5;
        box-shadow: 0 0 5px rgba(160, 32, 120, 0.3);
    }
    50% {
        opacity: 1;
        box-shadow: 0 0 10px rgba(160, 32, 120, 0.6);
    }
}

.glr-divider-diamond {
    color: #a02078;
    font-size: 0.6rem;
    animation: glr-diamond-spin 4s linear infinite;
    filter: drop-shadow(0 0 5px rgba(160, 32, 120, 0.8));
}

@keyframes glr-diamond-spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.glr-subtitle {
    font-family: 'Lato', 'Segoe UI', sans-serif;
    font-size: 0.85rem;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.85);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin: 0;
    
    /* Efecto de brillo sutil para el subtítulo */
    text-shadow: 
        0 0 10px rgba(255, 255, 255, 0.3),
        0 2px 4px rgba(0, 0, 0, 0.4);
    
    animation: glr-subtitle-fade 1s ease-out 0.5s both, glr-subtitle-glow 3s ease-in-out 1.5s infinite;
}

@keyframes glr-subtitle-fade {
    0% {
        opacity: 0;
        transform: translateY(10px);
    }
    100% {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Animación de brillo sutil para el subtítulo */
@keyframes glr-subtitle-glow {
    0%, 100% {
        text-shadow: 
            0 0 10px rgba(255, 255, 255, 0.3),
            0 2px 4px rgba(0, 0, 0, 0.4);
    }
    50% {
        text-shadow: 
            0 0 15px rgba(255, 255, 255, 0.5),
            0 0 20px rgba(160, 32, 120, 0.3),
            0 2px 4px rgba(0, 0, 0, 0.4);
    }
}

/* Efecto hover en el título */
.glr-main-title:hover .glr-title-icon {
    animation: glr-icon-hover 0.6s ease forwards;
}

@keyframes glr-icon-hover {
    0% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.3) rotate(15deg); }
    100% { transform: scale(1.1) rotate(0deg); }
}

.glr-gallery-track {
    display: flex;
    transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    height: 100%;
    align-items: center;
    gap: 40px;
    padding: 0;
    will-change: transform;
}

.glr-gallery-item {
    flex-shrink: 0;
    width: 520px;
    height: 540px;
    position: relative;
    transition: all 0.4s ease;
    cursor: pointer;
}

.glr-gallery-item.glr-active {
    transform: scale(1.08);
    z-index: 10;
}

.glr-gallery-item.glr-prev,
.glr-gallery-item.glr-next {
    transform: scale(0.92);
    opacity: 0.5;
}

.glr-gallery-item.glr-hidden {
    opacity: 0;
    transform: scale(0.85);
    pointer-events: none;
}

.glr-image-wrapper {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
    background: linear-gradient(135deg, #57575700 0%, #0000008e 100%);
}

.glr-gallery-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.5s ease;
}

.glr-gallery-item:hover .glr-gallery-image {
    transform: scale(1.05);
}

.glr-image-frame {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    border-radius: 12px;
    pointer-events: none;
}

/* ============================================ */
/* FLECHAS CENTRALES - GLOW CON PALETA MORADA   */
/* ============================================ */
.glr-nav-arrows {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    transform: translateY(-50%);
    display: flex;
    justify-content: space-between;
    padding: 0 30px;
    z-index: 100;
    pointer-events: none;
}

.glr-arrow-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: transparent;
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    color: rgba(255, 255, 255, 0.8);
    pointer-events: auto;
    box-shadow: 0 0 0 rgba(128, 0, 96, 0);
}

.glr-arrow-btn:hover {
    background: rgba(128, 0, 96, 0.15);
    border-color: rgba(160, 32, 120, 0.6);
    color: #a02078;
    box-shadow: 0 0 25px rgba(128, 0, 96, 0.5), 0 0 50px rgba(160, 32, 120, 0.2);
    transform: scale(1.05);
}

.glr-arrow-btn:active {
    transform: scale(0.98);
    box-shadow: 0 0 15px rgba(128, 0, 96, 0.7);
}

.glr-slide-counter {
    position: absolute;
    bottom: 45px;
    left: 40px;
    font-size: 0.8rem;
    background: rgba(26, 15, 46, 0.7);
    backdrop-filter: blur(8px);
    padding: 6px 16px;
    border-radius: 40px;
    border: 1px solid rgba(128, 0, 96, 0.4);
    color: #cbd5e1;
    z-index: 100;
}

.glr-slide-counter span:first-child {
    color: #a02078;
    font-weight: 600;
}

.glr-loading-placeholder {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #000000d8 0%, #1a0f2e 100%);
    color: #0e020a;
    font-size: 1.2rem;
    font-weight: 300;
    text-align: center;
    flex-direction: column;
}

.glr-autoplay-indicator {
    position: absolute;
    bottom: 45px;
    right: 40px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.7rem;
    color: #a02078;
    background: rgba(26, 15, 46, 0.7);
    backdrop-filter: blur(8px);
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid rgba(128, 0, 96, 0.4);
    z-index: 100;
    opacity: 0.8;
    transition: opacity 0.3s;
}

.glr-autoplay-indicator:hover {
    opacity: 1;
}

.glr-autoplay-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #a02078;
    animation: glr-pulse 2s infinite;
}

@keyframes glr-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
}

/* RESPONSIVE */
@media (max-width: 1024px) {
    .glr-main-title {
        font-size: 1.7rem;
        gap: 12px;
    }
    .glr-title-icon {
        font-size: 1.3rem;
    }
    .glr-subtitle {
        font-size: 0.8rem;
        letter-spacing: 1.2px;
    }
    .glr-divider-line {
        width: 50px;
    }
    .glr-gallery-item { width: 360px; height: 340px; }
    .glr-gallery-track { gap: 30px; }
    .glr-arrow-btn { width: 50px; height: 50px; }
    .glr-arrow-btn svg { width: 24px; height: 24px; }
    .glr-nav-arrows { padding: 0 20px; }
}

@media (max-width: 768px) {
    .glr-gallery-container {
        height: auto;
        min-height: 100vh;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
    }
    .glr-gallery-header {
        position: fixed;
        top: 10px;
        left: 0;
        right: 0;
        z-index: 200;
        padding: 0 15px;
    }
    .glr-main-title {
        font-size: 1.3rem;
        letter-spacing: 1.5px;
        margin-bottom: 5px;
        gap: 10px;
    }
    .glr-title-icon {
        font-size: 1.1rem;
    }
    .glr-subtitle {
        font-size: 0.7rem;
        letter-spacing: 1px;
    }
    .glr-divider-line {
        width: 35px;
    }
    .glr-divider-diamond {
        font-size: 0.5rem;
    }
    .glr-title-divider {
        margin-bottom: 6px;
    }
    .glr-gallery-track {
        flex-direction: column;
        padding: 20px;
        gap: 15px;
        transform: none !important;
        height: auto;
        margin-top: 100px;
    }
    .glr-gallery-item {
        width: 90%;
        max-width: 380px;
        height: auto;
        aspect-ratio: 4 / 5;
        margin: 0 auto;
        transform: scale(1) !important;
        opacity: 1 !important;
    }
    .glr-gallery-item.glr-prev,
    .glr-gallery-item.glr-next,
    .glr-gallery-item.glr-hidden { display: none; }
    .glr-gallery-item.glr-active { display: block; transform: scale(1) !important; }
    .glr-nav-arrows {
        position: fixed;
        top: 50%;
        left: 0;
        right: 0;
        transform: translateY(-50%);
        padding: 0 10px;
        z-index: 200;
        pointer-events: none;
    }
    .glr-arrow-btn {
        width: 48px;
        height: 48px;
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.25);
        pointer-events: auto;
    }
    .glr-slide-counter {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 200;
        background: rgba(26, 15, 46, 0.9);
        white-space: nowrap;
        font-size: 0.7rem;
        padding: 4px 12px;
    }
    .glr-autoplay-indicator {
        right: 50%;
        transform: translateX(50%);
        bottom: 55px;
    }
}

@media (max-width: 480px) {
    .glr-main-title {
        font-size: 1.1rem;
        gap: 8px;
    }
    .glr-title-icon {
        font-size: 0.9rem;
    }
    .glr-subtitle {
        font-size: 0.65rem;
        letter-spacing: 1px;
    }
    .glr-divider-line {
        width: 25px;
    }
    .glr-arrow-btn { width: 42px; height: 42px; }
    .glr-arrow-btn svg { width: 20px; height: 20px; }
    .glr-gallery-item { max-width: 320px; }
}

@media (min-width: 1400px) {
    .glr-main-title {
        font-size: 2.2rem;
        gap: 18px;
    }
    .glr-title-icon {
        font-size: 1.7rem;
    }
    .glr-subtitle {
        font-size: 0.9rem;
    }
    .glr-divider-line {
        width: 80px;
    }
    .glr-gallery-item { width: 550px; height: 500px; }
    .glr-gallery-track { gap: 50px; }
    .glr-nav-arrows { padding: 0 60px; }
    .glr-arrow-btn { width: 70px; height: 70px; }
    .glr-arrow-btn svg { width: 32px; height: 32px; }
}
</style>

<!-- JavaScript AISLADO DE LA GALERÍA -->
<script>
(function() {
    // ⚙️ CONFIGURACIÓN
    const AUTO_SCROLL_ENABLED = true;
    const AUTO_SCROLL_PAUSE_ON_HOVER = true;
    
    // 🚀 VELOCIDAD DEL SCROLL CONTINUO (píxeles por frame) - LIGERAMENTE AUMENTADA
    const CONTINUOUS_SCROLL_SPEED = 0.95;
    
    // DATOS DE LAS OBRAS
    const obras = [
        { titulo: "Amanecer Eterno" },
        { titulo: "Silencio Geométrico" },
        { titulo: "Horizontes Lejanos" },
        { titulo: "El Vacío" },
        { titulo: "Raíces Profundas" },
        { titulo: "Sueños Líquidos" },
        { titulo: "Resplandor Nocturno" },
        { titulo: "Estructuras" },
        { titulo: "Jardín Secreto" },
        { titulo: "Memoria Fragmentada" },
        { titulo: "Renacer" }
    ];

    // RUTAS DE IMÁGENES
    const imagePaths = [
        './img/foto (9).jpg',
        './img/foto (2).jpg',
        './img/foto (3).jpg',
        './img/foto (4).jpg',
        './img/foto (5).jpg',
        './img/foto (6).jpg',
        './img/foto (7).jpg',
        './img/foto (8).jpg',
        './img/fotis.jpg',
        './img/foto (10).jpg',
        './img/foto (11).jpg'
    ];

    let currentIndex = 0;
    let currentOffset = 0;
    let itemWidth = 520;
    let continuousScrollId = null;
    let isUserInteracting = false;
    let interactionTimeout = null;
    let isSnapping = false;
    let isInitialized = false;
    
    const track = document.getElementById('glr-galleryTrack');
    const container = document.querySelector('.glr-gallery-container');
    const totalSlides = obras.length;

    if (!track) return;

    // Crear elementos de la galería
    function createGalleryItems() {
        track.innerHTML = '';
        
        // Duplicar 3 veces para efecto infinito
        const itemsToCreate = [...obras, ...obras, ...obras];
        const pathsToUse = [...imagePaths, ...imagePaths, ...imagePaths];
        
        itemsToCreate.forEach((obra, index) => {
            const item = document.createElement('div');
            item.className = 'glr-gallery-item';
            item.dataset.realIndex = index % obras.length;
            
            const wrapper = document.createElement('div');
            wrapper.className = 'glr-image-wrapper';
            
            const img = document.createElement('img');
            img.className = 'glr-gallery-image';
            img.src = pathsToUse[index];
            img.alt = obra.titulo;
            img.loading = 'lazy';
            img.draggable = false;
            
            img.onerror = function() {
                this.style.display = 'none';
                const placeholder = document.createElement('div');
                placeholder.className = 'glr-loading-placeholder';
                placeholder.innerHTML = `
                    <div style="text-align: center;">
                        <div style="font-size: 3rem; margin-bottom: 10px;">🎨</div>
                        <div>Foto ${(index % obras.length) + 1}</div>
                        <div style="font-size: 0.9rem; margin-top: 5px;">${obra.titulo}</div>
                    </div>
                `;
                wrapper.appendChild(placeholder);
            };
            
            const frame = document.createElement('div');
            frame.className = 'glr-image-frame';
            
            wrapper.appendChild(img);
            wrapper.appendChild(frame);
            item.appendChild(wrapper);
            track.appendChild(item);
        });
        
        const totalSpan = document.getElementById('glr-totalSlides');
        if (totalSpan) totalSpan.textContent = obras.length.toString().padStart(2, '0');
        
        // Calcular ancho real
        updateItemWidth();
    }
    
    function updateItemWidth() {
        const firstItem = track.querySelector('.glr-gallery-item');
        if (firstItem) {
            const width = firstItem.offsetWidth;
            const gap = 40;
            itemWidth = width + gap;
        }
    }

    // Obtener el offset para centrar una imagen específica
    function getOffsetForIndex(targetRealIndex) {
        const items = track.querySelectorAll('.glr-gallery-item');
        let targetItem = null;
        
        for (let item of items) {
            if (parseInt(item.dataset.realIndex) === targetRealIndex) {
                targetItem = item;
                break;
            }
        }
        
        if (!targetItem) return 0;
        
        const containerWidth = container.clientWidth;
        const targetRect = targetItem.getBoundingClientRect();
        
        const targetCenter = targetRect.left + targetRect.width / 2;
        const containerCenter = containerWidth / 2;
        
        let newOffset = currentOffset + (containerCenter - targetCenter);
        
        return newOffset;
    }
    
    // Centrar en la primera imagen
    function centerOnFirstImage() {
        const items = track.querySelectorAll('.glr-gallery-item');
        let firstRealItem = null;
        
        for (let item of items) {
            if (parseInt(item.dataset.realIndex) === 0) {
                firstRealItem = item;
                break;
            }
        }
        
        if (!firstRealItem) return;
        
        const containerWidth = container.clientWidth;
        const targetRect = firstRealItem.getBoundingClientRect();
        
        const targetCenter = targetRect.left + targetRect.width / 2;
        const containerCenter = containerWidth / 2;
        
        currentOffset = currentOffset + (containerCenter - targetCenter);
        
        track.style.transition = 'none';
        track.style.transform = `translateX(${currentOffset}px)`;
        
        void track.offsetHeight;
        
        currentIndex = 0;
        updateVisualState();
        
        const currentIdxSpan = document.getElementById('glr-currentIdx');
        if (currentIdxSpan) currentIdxSpan.textContent = '01';
    }
    
    // Actualizar clases visuales
    function updateVisualState() {
        if (window.innerWidth <= 768) return;
        
        const items = track.querySelectorAll('.glr-gallery-item');
        const containerWidth = container.clientWidth;
        const centerX = containerWidth / 2;
        
        let closestRealIndex = 0;
        let minDistance = Infinity;
        
        items.forEach((item) => {
            const rect = item.getBoundingClientRect();
            const itemCenter = rect.left + rect.width / 2;
            const distance = Math.abs(itemCenter - centerX);
            
            if (distance < minDistance) {
                minDistance = distance;
                closestRealIndex = parseInt(item.dataset.realIndex);
            }
        });
        
        // Actualizar currentIndex
        if (closestRealIndex !== undefined && !isSnapping) {
            currentIndex = closestRealIndex;
            const currentIdxSpan = document.getElementById('glr-currentIdx');
            if (currentIdxSpan) currentIdxSpan.textContent = (currentIndex + 1).toString().padStart(2, '0');
        }
        
        // Aplicar clases
        items.forEach((item) => {
            item.classList.remove('glr-active', 'glr-prev', 'glr-next', 'glr-hidden');
            const rect = item.getBoundingClientRect();
            const itemCenter = rect.left + rect.width / 2;
            const distance = Math.abs(itemCenter - centerX);
            
            if (distance < rect.width * 0.6) {
                item.classList.add('glr-active');
            } else if (distance < rect.width * 2) {
                if (itemCenter < centerX) {
                    item.classList.add('glr-prev');
                } else {
                    item.classList.add('glr-next');
                }
            } else {
                item.classList.add('glr-hidden');
            }
        });
    }
    
    // Scroll continuo
    function startContinuousScroll() {
        if (!AUTO_SCROLL_ENABLED) return;
        if (isUserInteracting || isSnapping) return;
        if (window.innerWidth <= 768) return;
        
        if (continuousScrollId) {
            cancelAnimationFrame(continuousScrollId);
            continuousScrollId = null;
        }
        
        track.style.transition = 'none';
        
        function animateScroll() {
            if (!AUTO_SCROLL_ENABLED || isUserInteracting || isSnapping) {
                continuousScrollId = null;
                return;
            }
            
            currentOffset -= CONTINUOUS_SCROLL_SPEED;
            
            const totalWidth = itemWidth * obras.length;
            if (Math.abs(currentOffset) >= totalWidth) {
                currentOffset = 0;
                track.style.transform = `translateX(0px)`;
                updateVisualState();
            } else {
                track.style.transform = `translateX(${currentOffset}px)`;
                updateVisualState();
            }
            
            continuousScrollId = requestAnimationFrame(animateScroll);
        }
        
        animateScroll();
    }
    
    function stopContinuousScroll() {
        if (continuousScrollId) {
            cancelAnimationFrame(continuousScrollId);
            continuousScrollId = null;
        }
    }
    
    // Snap a una imagen específica
    function snapToImage(targetIndex) {
        if (isSnapping) return;
        
        isSnapping = true;
        stopContinuousScroll();
        
        let newIndex = targetIndex;
        if (newIndex < 0) newIndex = obras.length - 1;
        if (newIndex >= obras.length) newIndex = 0;
        
        const targetOffset = getOffsetForIndex(newIndex);
        
        if (targetOffset !== undefined) {
            currentOffset = targetOffset;
            track.style.transition = 'transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            track.style.transform = `translateX(${currentOffset}px)`;
            
            setTimeout(() => {
                track.style.transition = '';
                isSnapping = false;
                currentIndex = newIndex;
                updateVisualState();
                
                const currentIdxSpan = document.getElementById('glr-currentIdx');
                if (currentIdxSpan) currentIdxSpan.textContent = (currentIndex + 1).toString().padStart(2, '0');
                
                if (AUTO_SCROLL_ENABLED && !isUserInteracting && window.innerWidth > 768) {
                    startContinuousScroll();
                }
            }, 550);
        } else {
            isSnapping = false;
            if (AUTO_SCROLL_ENABLED && !isUserInteracting) startContinuousScroll();
        }
    }
    
    function nextSlide() {
        if (isSnapping) return;
        const nextIdx = (currentIndex + 1) % obras.length;
        snapToImage(nextIdx);
    }
    
    function prevSlide() {
        if (isSnapping) return;
        const prevIdx = (currentIndex - 1 + obras.length) % obras.length;
        snapToImage(prevIdx);
    }
    
    function handleUserInteraction() {
        if (isSnapping) return;
        
        isUserInteracting = true;
        stopContinuousScroll();
        
        if (interactionTimeout) clearTimeout(interactionTimeout);
        
        interactionTimeout = setTimeout(() => {
            isUserInteracting = false;
            if (AUTO_SCROLL_ENABLED && window.innerWidth > 768) {
                startContinuousScroll();
            }
        }, 800);
    }
    
    // FUNCIÓN ESPECIAL PARA FORZAR EL AUTO-SCROLL AL INICIO
    function forceStartAutoScroll() {
        if (!AUTO_SCROLL_ENABLED) return;
        if (window.innerWidth <= 768) return;
        
        isUserInteracting = false;
        isSnapping = false;
        
        startContinuousScroll();
    }
    
    // Inicialización
    function init() {
        createGalleryItems();
        
        setTimeout(() => {
            updateItemWidth();
            centerOnFirstImage();
            isInitialized = true;
            
            setTimeout(() => {
                forceStartAutoScroll();
            }, 300);
            
            setTimeout(() => {
                if (!continuousScrollId) {
                    forceStartAutoScroll();
                }
            }, 800);
            
            setTimeout(() => {
                if (!continuousScrollId) {
                    forceStartAutoScroll();
                }
            }, 1500);
        }, 150);
        
        // Event listeners
        const prevBtn = document.getElementById('glr-prevBtn');
        const nextBtn = document.getElementById('glr-nextBtn');
        
        if (prevBtn) {
            prevBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                handleUserInteraction();
                prevSlide();
            });
        }
        if (nextBtn) {
            nextBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                handleUserInteraction();
                nextSlide();
            });
        }
        
        if (container && AUTO_SCROLL_PAUSE_ON_HOVER) {
            container.addEventListener('mouseenter', () => {
                isUserInteracting = true;
                stopContinuousScroll();
            });
            container.addEventListener('mouseleave', () => {
                setTimeout(() => {
                    if (!isUserInteracting && AUTO_SCROLL_ENABLED && isInitialized) {
                        forceStartAutoScroll();
                    }
                }, 300);
            });
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                handleUserInteraction();
                prevSlide();
            }
            if (e.key === 'ArrowRight') {
                e.preventDefault();
                handleUserInteraction();
                nextSlide();
            }
        });
        
        let touchStartX = 0;
        track.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            handleUserInteraction();
        }, { passive: true });
        
        track.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const diff = touchEndX - touchStartX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) prevSlide();
                else nextSlide();
            }
        }, { passive: true });
        
        window.addEventListener('resize', () => {
            stopContinuousScroll();
            setTimeout(() => {
                updateItemWidth();
                if (isInitialized) {
                    const targetOffset = getOffsetForIndex(currentIndex);
                    if (targetOffset !== undefined) {
                        currentOffset = targetOffset;
                        track.style.transition = 'none';
                        track.style.transform = `translateX(${currentOffset}px)`;
                    }
                    updateVisualState();
                }
                if (AUTO_SCROLL_ENABLED && !isUserInteracting && isInitialized) {
                    forceStartAutoScroll();
                }
            }, 200);
        });
    }
    
    init();
})();
</script>
