<!-- ============================================ -->
<!-- COMPONENTE: Laptop 3D + Video                -->
<!-- ESTILO PRO - FONDO MINIMALISTA               -->
<!-- VIDEO: video.mp4 (ruta relativa)             -->
<!-- PALETA: #050a10, #0d1f33, #800060            -->
<!-- ============================================ -->

<div class="glr-gallery-container">
    <div class="glr-gallery-logo">GALLERIE D'ART</div>
    
    <!-- 🎬 LAPTOP 3D CON VIDEO -->
    <div class="glr-laptop-wrapper">
        <div class="glr-laptop-3d">
            <!-- Pantalla con video -->
            <div class="glr-laptop-screen">
                <video class="glr-laptop-video" autoplay loop muted playsinline preload="auto">
                    <source src="video.mp4" type="video/mp4">
                </video>
                <div class="glr-screen-overlay"></div>
            </div>
            <!-- Base -->
            <div class="glr-laptop-base">
                <div class="glr-laptop-trackpad"></div>
            </div>
            <!-- Bisagra -->
            <div class="glr-laptop-hinge"></div>
            <!-- Cámara -->
            <div class="glr-laptop-camera"></div>
        </div>
    </div>

    <!-- Elementos decorativos de fondo -->
    <div class="glr-bg-glow-1"></div>
    <div class="glr-bg-glow-2"></div>
    <div class="glr-bg-glow-3"></div>
    <div class="glr-bg-grid"></div>
</div>

<!-- CSS CON PALETA PERSONALIZADA -->
<style>
:root {
    --primary: #050a10;
    --secondary: #0d1f33;
    --accent: #800060;
    --accent-light: #a02078;
    --accent-glow: rgba(128, 0, 96, 0.4);
    --text: #e0e6ed;
    --text-muted: #8b95a5;
    --white: #ffffff;
    --gradient: linear-gradient(135deg, #050a10 0%, #0d1f33 50%, #071424 100%);
    --accent-gradient: linear-gradient(135deg, #800060, #4d0039);
}

/* Reset */
.glr-gallery-container * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Contenedor principal */
.glr-gallery-container {
    position: relative;
    width: 100%;
    height: 100vh;
    min-height: 600px;
    overflow: hidden;
    font-family: 'Lato', 'Segoe UI', sans-serif;
    background: var(--gradient);
    display: flex;
    align-items: center;
    justify-content: center;
}

/* ============================================ */
/* EFECTOS DE FONDO PROFESIONALES               */
/* ============================================ */

/* Grid sutil */
.glr-bg-grid {
    position: absolute;
    inset: 0;
    background-image: 
        linear-gradient(var(--text-muted) 1px, transparent 1px),
        linear-gradient(90deg, var(--text-muted) 1px, transparent 1px);
    background-size: 50px 50px;
    opacity: 0.04;
    pointer-events: none;
    z-index: 0;
}

/* Glows decorativos */
.glr-bg-glow-1 {
    position: absolute;
    top: -20%;
    left: -10%;
    width: 60%;
    height: 60%;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
    filter: blur(80px);
    opacity: 0.5;
    pointer-events: none;
    z-index: 0;
    animation: glr-pulse-slow 8s ease-in-out infinite;
}

.glr-bg-glow-2 {
    position: absolute;
    bottom: -20%;
    right: -10%;
    width: 55%;
    height: 55%;
    background: radial-gradient(circle, rgba(128, 0, 96, 0.25) 0%, transparent 70%);
    filter: blur(90px);
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
    animation: glr-pulse-slow 10s ease-in-out infinite reverse;
}

.glr-bg-glow-3 {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80%;
    height: 80%;
    background: radial-gradient(circle, rgba(13, 31, 51, 0.6) 0%, transparent 80%);
    filter: blur(60px);
    pointer-events: none;
    z-index: 0;
}

@keyframes glr-pulse-slow {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.08); }
}

/* Logo superior */
.glr-gallery-logo {
    position: absolute;
    top: 30px;
    left: 40px;
    font-family: 'Playfair Display', 'Georgia', serif;
    font-weight: 700;
    letter-spacing: 2px;
    font-size: 0.9rem;
    text-transform: uppercase;
    z-index: 100;
    color: var(--text);
    background: rgba(5, 10, 16, 0.7);
    backdrop-filter: blur(8px);
    padding: 6px 16px;
    border-radius: 40px;
    border-left: 3px solid var(--accent);
    pointer-events: none;
}

/* ============================================ */
/* 🎬 LAPTOP 3D VISTA FRONTAL                  */
/* ============================================ */
.glr-laptop-wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 30;
    perspective: 1200px;
    width: 100%;
    display: flex;
    justify-content: center;
}

.glr-laptop-3d {
    position: relative;
    width: 720px;
    max-width: 90vw;
    transform-style: preserve-3d;
    transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

/* Efecto hover sutil */
.glr-laptop-3d:hover {
    transform: translateY(-5px) rotateX(1deg);
}

/* Pantalla */
.glr-laptop-screen {
    position: relative;
    width: 100%;
    aspect-ratio: 16/10;
    background: #000;
    border-radius: 20px 20px 10px 10px;
    border: 3px solid var(--secondary);
    border-bottom: 2px solid var(--accent);
    box-shadow: 
        inset 0 0 60px rgba(128, 0, 96, 0.1),
        0 30px 50px -15px rgba(0, 0, 0, 0.8),
        0 0 0 1px rgba(128, 0, 96, 0.3);
    overflow: hidden;
}

.glr-laptop-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

/* Overlay con reflejo sutil */
.glr-screen-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
        135deg,
        rgba(128, 0, 96, 0.08) 0%,
        transparent 30%,
        transparent 70%,
        rgba(128, 0, 96, 0.05) 100%
    );
    pointer-events: none;
    z-index: 2;
}

/* Base de la laptop */
.glr-laptop-base {
    position: relative;
    width: 100%;
    height: 24px;
    background: linear-gradient(to bottom, var(--secondary), var(--primary));
    border-radius: 4px 4px 14px 14px;
    border: 3px solid var(--secondary);
    border-top: none;
    box-shadow: 
        0 18px 30px -8px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(128, 0, 96, 0.2);
}

.glr-laptop-trackpad {
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 140px;
    height: 10px;
    background: linear-gradient(to bottom, #1a2a3f, var(--secondary));
    border-radius: 6px;
    box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.5);
}

/* Bisagra */
.glr-laptop-hinge {
    position: absolute;
    top: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 7px;
    background: linear-gradient(to right, var(--primary), var(--accent-light), var(--primary));
    border-radius: 4px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.3);
}

/* Cámara web */
.glr-laptop-camera {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 8px;
    height: 8px;
    background: var(--primary);
    border-radius: 50%;
    border: 1.5px solid var(--accent-light);
    z-index: 5;
    box-shadow: 0 0 0 2px rgba(128, 0, 96, 0.2);
}
.glr-laptop-camera::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 3px;
    height: 3px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 4px var(--accent);
    animation: glr-camera-blink 3s infinite;
}

@keyframes glr-camera-blink {
    0%, 95%, 100% { opacity: 1; }
    97% { opacity: 0.3; }
}

/* ============================================ */
/* RESPONSIVE                                  */
/* ============================================ */
@media (max-width: 1024px) {
    .glr-laptop-3d { width: 580px; }
}

@media (max-width: 768px) {
    .glr-gallery-container {
        height: auto;
        min-height: 100vh;
        padding: 80px 0 40px;
    }
    .glr-gallery-logo {
        position: fixed;
        top: 15px;
        left: 15px;
        font-size: 0.7rem;
        padding: 4px 12px;
        z-index: 200;
    }
    .glr-laptop-wrapper {
        position: relative;
        transform: none;
        top: auto;
        left: auto;
        margin: 0 auto;
    }
    .glr-laptop-3d {
        width: 85%;
        max-width: 400px;
    }
    .glr-bg-glow-1, .glr-bg-glow-2 {
        width: 80%;
        height: 80%;
        filter: blur(60px);
    }
}

@media (max-width: 480px) {
    .glr-laptop-3d { max-width: 320px; }
    .glr-laptop-trackpad { width: 100px; height: 8px; }
}

@media (min-width: 1400px) {
    .glr-laptop-3d { width: 850px; }
}
</style>

<!-- JS robusto para video -->
<script>
(function() {
    const video = document.querySelector('.glr-laptop-video');
    if (!video) return;
    
    // ========================================
    // 1. CORRECCIÓN DE RUTA - Fallback robusto
    // ========================================
    const source = video.querySelector('source');
    const posiblesRutas = ['video.mp4', './video.mp4', '/video.mp4', '../video.mp4'];
    let intentoActual = 0;
    
    function intentarCargarVideo() {
        if (intentoActual >= posiblesRutas.length) {
            console.warn('❌ No se pudo cargar video.mp4 en ninguna ruta');
            mostrarPlaceholder();
            return;
        }
        const ruta = posiblesRutas[intentoActual];
        if (source) source.src = ruta;
        video.load();
        
        video.onerror = function() {
            console.log(`⚠️ Falló carga en: ${ruta}`);
            intentoActual++;
            intentarCargarVideo();
        };
    }
    
    function mostrarPlaceholder() {
        const screen = document.querySelector('.glr-laptop-screen');
        if (screen && !screen.querySelector('.video-placeholder')) {
            const placeholder = document.createElement('div');
            placeholder.className = 'video-placeholder';
            placeholder.innerHTML = `
                <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg, #050a10, #0d1f33); flex-direction:column; gap:15px;">
                    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#800060" stroke-width="1.5">
                        <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                        <polygon points="10 8 16 12 10 16 10 8" fill="#800060" fill-opacity="0.5"></polygon>
                    </svg>
                    <span style="color:#a02078; font-family:monospace;">video.mp4</span>
                    <span style="color:#8b95a5; font-size:12px;">Coloca el archivo en la misma carpeta</span>
                </div>
            `;
            placeholder.style.position = 'absolute';
            placeholder.style.inset = '0';
            placeholder.style.zIndex = '10';
            screen.style.position = 'relative';
            screen.appendChild(placeholder);
            video.style.opacity = '0.3';
        }
    }
    
    intentarCargarVideo();
    
    // ========================================
    // 2. AUTO-REPRODUCCIÓN
    // ========================================
    video.muted = true;
    video.playsInline = true;
    video.loop = true;
    
    const playVideo = () => {
        video.play().catch(e => {
            console.log('⏸ Autoplay bloqueado');
            document.addEventListener('click', function playOnce() {
                video.play().catch(()=>{});
                document.removeEventListener('click', playOnce);
            }, { once: true });
        });
    };
    
    video.addEventListener('canplay', playVideo);
    
    // ========================================
    // 3. INTERSECTION OBSERVER
    // ========================================
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                video.play().catch(() => {});
            } else {
                video.pause();
            }
        });
    }, { threshold: 0.2 });
    observer.observe(video);
    
    // ========================================
    // 4. Efecto hover en pantalla
    // ========================================
    const screen = document.querySelector('.glr-laptop-screen');
    if (screen) {
        screen.addEventListener('mouseenter', () => {
            screen.style.boxShadow = 'inset 0 0 40px rgba(128, 0, 96, 0.25), 0 30px 50px -15px rgba(0,0,0,0.8), 0 0 0 2px rgba(128, 0, 96, 0.4)';
        });
        screen.addEventListener('mouseleave', () => {
            screen.style.boxShadow = 'inset 0 0 60px rgba(128, 0, 96, 0.1), 0 30px 50px -15px rgba(0,0,0,0.8), 0 0 0 1px rgba(128, 0, 96, 0.3)';
        });
    }
    
    console.log('🎬 Laptop 3D lista - Usando paleta #800060');
})();
</script>
