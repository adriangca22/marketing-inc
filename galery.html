<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Render Fotorealista</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:#07000d;
      overflow:hidden;
    }

    .hero{
      width:100%;
      height:100vh;
      position:relative;

      display:flex;
      align-items:center;
      justify-content:space-between;

      padding:0 9%;

      overflow:hidden;

      background:
      radial-gradient(circle at center,
      rgba(183,0,255,.35) 0%,
      rgba(90,0,120,.25) 30%,
      rgba(10,0,20,1) 75%);
    }

    /* GRID BACKGROUND */
    .hero::before{
      content:"";
      position:absolute;
      inset:0;

      background-image:
      linear-gradient(rgba(255,0,255,.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,0,255,.08) 1px, transparent 1px);

      background-size:32px 32px;

      mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
      opacity:.55;
    }

    /* CARD - MÁS CUADRADA Y CON MENOS ALTURA */
    .card{
      position:relative;
      z-index:2;

      width:320px;

      /* Padding reducido para hacerlo más cuadrado y menos alto */
      padding:20px 28px;

      border-radius:28px;

      background:#090814;

      border:1px solid rgba(255,0,255,.2);

      /* BOX SHADOW MÁS NOTORIA EN NEGRO */
      box-shadow:
      0 25px 50px -12px rgba(0,0,0,0.8),
      0 0 0 1px rgba(255,255,255,.02) inset,
      0 0 30px rgba(255,0,255,.15);

      text-align:center;
    }

    .icon-wrap{
      width:65px;
      height:65px;

      margin:0 auto 14px;

      border-radius:20px;

      display:flex;
      align-items:center;
      justify-content:center;

      border:2px solid #ff00ff33;

      box-shadow:
      0 0 15px rgba(255,0,255,.2);

      background:#120b24;
    }

    .cube{
      width:30px;
      height:30px;

      border:4px solid #fff;
      border-radius:8px;

      transform:rotate(45deg);

      position:relative;
    }

    .cube::after{
      content:"";
      position:absolute;

      width:12px;
      height:12px;

      background:#fff;

      right:-5px;
      top:6px;
    }

    .card h1{
      color:#fff;
      font-size:1.65rem;
      line-height:1.1;

      margin-bottom:8px;

      font-weight:700;
    }

    .card p{
      color:#e3e3e3;

      font-size:.8rem;
      line-height:1.35;

      font-weight:300;

      margin-bottom:14px;
    }

    .blender{
      width:55px;

      margin-bottom:14px;

      filter:drop-shadow(0 0 10px rgba(255,170,0,.3));
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;

      width:155px;
      height:46px;

      border-radius:40px;

      text-decoration:none;

      color:#fff;
      font-weight:600;
      letter-spacing:.5px;

      border:2px solid rgba(255,0,255,.25);

      background:
      linear-gradient(180deg,
      rgba(255,0,255,.08),
      rgba(255,0,255,.02));

      box-shadow:
      inset 0 0 10px rgba(255,0,255,.1),
      0 0 15px rgba(255,0,255,.08);

      transition:.3s ease;
    }

    .btn:hover{
      transform:translateY(-3px);

      box-shadow:
      0 10px 25px rgba(255,0,255,.25);
    }

    /* SODA - CONTAINER RELATIVO PARA LA SOMBRA */
    .soda-area{
      position:relative;
      z-index:2;

      width:50%;

      display:flex;
      justify-content:center;
      align-items:center;

      margin-right:120px;
    }

    .soda{
      width:500px;

      transform:rotate(-18deg);

      filter:
      drop-shadow(0 40px 30px rgba(0,0,0,.8))
      drop-shadow(0 0 20px rgba(255,0,255,.2));

      animation:float 4s ease-in-out infinite;
    }

    @keyframes float{

      0%,100%{
        transform:rotate(-18deg) translateY(0px);
      }

      50%{
        transform:rotate(-18deg) translateY(-18px);
      }
    }

    /* SHADOW - DEBAJO DE LA SODA */
    .soda-shadow{
      position:absolute;
      bottom:-40px;
      left:60%;
      transform:translateX(-50%);
      width:380px;
      height:35px;
      background:radial-gradient(ellipse, rgb(0, 0, 0) 0%, rgba(0, 0, 0, 0.4) 50%, transparent 20%);
      filter:blur(12px);
      border-radius:50%;
      pointer-events:none;
      z-index:1;
    }

    /* INSTAGRAM */
    .insta{
      position:absolute;

      bottom:30px;
      right:40px;

      display:flex;
      align-items:center;
      gap:12px;

      padding:10px 18px;

      border-radius:18px;

      background:#140b20;

      border:1px solid rgba(255,255,255,.08);

      color:#fff;
      text-decoration:none;
      font-size:.9rem;

      z-index:3;
    }

    .insta-icon{
      width:34px;
      height:34px;

      border-radius:12px;

      border:2px solid #fff;

      display:flex;
      align-items:center;
      justify-content:center;

      font-weight:700;
      font-size:1rem;
    }

    @media(max-width:1000px){

      .hero{
        flex-direction:column;
        justify-content:center;

        gap:60px;

        padding:40px 20px;
      }

      .soda-area{
        width:100%;
        justify-content:center;
        margin-right:0;
      }

      .soda{
        width:300px;
      }

      .soda-shadow{
        width:240px;
        height:25px;
        bottom:20px;
      }

      .insta{
        right:20px;
        bottom:20px;

        transform:scale(.9);
      }
    }

    @media(max-width:480px){
      .card{
        width:90%;
        padding:18px 20px;
      }
      
      .card h1{
        font-size:1.4rem;
      }
      
      .soda-shadow{
        width:200px;
        height:20px;
        bottom:15px;
      }
    }

  </style>
</head>

<body>

  <section class="hero">

    <!-- CARD - MÁS CUADRADA -->
    <div class="card">

      <div class="icon-wrap">
        <div class="cube"></div>
      </div>

      <h1>Render Fotorealista</h1>

      <p>
        Visualización en alta fidelidad para exhibir productos,
        packaging y previsualización de proyectos, estrategia
        de branding con imágenes comerciales.
      </p>

      <!-- Blender -->
      <img
        class="blender"
        src="https://upload.wikimedia.org/wikipedia/commons/0/0c/Blender_logo_no_text.svg"
        alt="Blender"
      >

      <br>

      <a href="#" class="btn">
        COTIZAR
      </a>

    </div>

    <!-- SODA CON SOMBRA DEBAJO -->
    <div class="soda-area">
      <img src="soda.gif" alt="Soda" class="soda">
      <div class="soda-shadow"></div>
    </div>

    <!-- INSTAGRAM -->
 
  </section>

</body>
</html>
