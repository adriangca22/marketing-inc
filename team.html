<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#050a10; --bg2:#0d1f33; --acc:#800060; --acc2:#a02078;
      --txt:#e0e6ed; --muted:#8b95a5;
    }
    html, body { width:100%; background:transparent; color:var(--txt); font-family:'DM Sans',system-ui,sans-serif; }

    .team-section {
      width:100%; padding:2.8rem 2rem 2.4rem;
      background:linear-gradient(160deg,#071424 0%,#0d1f33 55%,#050a10 100%);
      border-radius:2.2rem; border:1px solid rgba(128,0,96,0.28);
      box-shadow:0 30px 60px -20px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,255,255,0.03);
      position:relative; overflow:hidden;
    }
    .team-section::before {
      content:''; position:absolute; inset:0;
      background:
        radial-gradient(ellipse 60% 40% at 15% 20%,rgba(128,0,96,0.08) 0%,transparent 70%),
        radial-gradient(ellipse 40% 50% at 85% 75%,rgba(128,0,96,0.06) 0%,transparent 70%);
      pointer-events:none;
    }

    /* ── TÍTULO CON GRADIENTE VIAJERO ── */
    .team-heading { text-align:center; margin-bottom:2.4rem; position:relative; display:flex; flex-direction:column; align-items:center; gap:.5rem; }

    .team-heading h2 {
      font-family:'Syne',sans-serif; font-size:clamp(1.8rem,4vw,2.8rem); font-weight:800;
      letter-spacing:-0.03em;
      /* gradiente amplio que viaja: blanco → violeta → blanco → violeta → blanco */
      background: linear-gradient(
        90deg,
        #ffffff 0%,
        #ffffff 15%,
        #cc44ff 28%,
        #8800cc 38%,
        #ff44ee 48%,
        #8800cc 58%,
        #cc44ff 68%,
        #ffffff 80%,
        #ffffff 100%
      );
      background-size: 250% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: gradientTravel 2.2s linear infinite;
    }

    @keyframes gradientTravel {
      0%   { background-position: 100% 0; }
      100% { background-position: -50% 0; }
    }

    .team-heading .sub {
      display:inline-flex; align-items:center; gap:.5rem; margin-top:.6rem;
      color:var(--muted); font-size:.95rem; font-weight:300;
      border-bottom:1px dashed rgba(128,0,96,.5); padding-bottom:.3rem;
    }
    .team-heading .sub::before,.team-heading .sub::after {
      content:''; display:block; width:24px; height:1px; background:var(--acc); opacity:.6;
    }

    .team-circles { display:flex; flex-wrap:wrap; justify-content:center; gap:2.5rem; margin-bottom:2.8rem; }
    .member-card { flex:0 0 240px; text-align:center; animation:fadeUp .7s ease both; }
    .member-card:nth-child(2) { animation-delay:.15s; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

    .circle-frame {
      width:210px; height:210px; margin:0 auto 1.1rem;
      border-radius:50%; position:relative; cursor:pointer;
      transition:transform .4s cubic-bezier(.2,.8,.4,1);
    }
    .circle-frame:hover { transform:translateY(-6px) scale(1.04); }
    .circle-border {
      position:absolute; inset:-2px; border-radius:50%;
      border:1.5px solid rgba(128,0,96,0.5);
      transition:border-color .4s ease;
    }
    .circle-frame:hover .circle-border { border-color:rgba(200,80,180,0.8); }
    .circle-orbit {
      position:absolute; inset:-5px; border-radius:50%;
      animation:orbitSpin 4s linear infinite;
    }
    .circle-orbit::before {
      content:''; position:absolute;
      width:10px; height:10px; border-radius:50%;
      background:radial-gradient(circle,#e080ff,#a020c0);
      top:50%; left:-3px; transform:translateY(-50%);
      box-shadow:0 0 10px rgba(200,80,255,0.9),0 0 20px rgba(160,32,192,0.5);
    }
    .circle-frame:hover .circle-orbit { animation-duration:1.8s; }
    @keyframes orbitSpin { to{ transform:rotate(360deg); } }
    .circle-orbit2 {
      position:absolute; inset:-5px; border-radius:50%;
      animation:orbitSpin 4s linear infinite;
      animation-delay:-2s;
    }
    .circle-orbit2::before {
      content:''; position:absolute;
      width:6px; height:6px; border-radius:50%;
      background:radial-gradient(circle,#ffffff,#cc60ee);
      top:50%; left:-1px; transform:translateY(-50%);
      box-shadow:0 0 6px rgba(255,255,255,0.7);
    }
    .circle-frame:hover .circle-orbit2 { animation-duration:1.8s; }
    .circle-glow {
      position:absolute; inset:-18px; border-radius:50%;
      background:radial-gradient(circle,rgba(160,32,120,0.22) 0%,transparent 68%);
      opacity:0; transition:opacity .5s ease;
      pointer-events:none; z-index:-1;
    }
    .circle-frame:hover .circle-glow { opacity:1; }
    .circle-frame::after { content:''; position:absolute; inset:3px; border-radius:50%; background:var(--bg); z-index:0; }
    .photo-placeholder {
      position:absolute; inset:5px; border-radius:50%; overflow:hidden; z-index:1; background:#0a111c;
    }
    .photo-placeholder img {
      width:100%; height:100%; object-fit:cover; display:block;
      transition:transform .4s ease, filter .4s ease;
    }
    .circle-frame:hover .photo-placeholder img { transform:scale(1.06); filter:brightness(1.08) saturate(1.15); }
    .photo-placeholder::after {
      content:''; position:absolute; inset:0; border-radius:50%;
      background:linear-gradient(135deg,rgba(255,255,255,0.06) 0%,transparent 50%);
      pointer-events:none;
    }
    .no-photo-icon { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:3rem; background:radial-gradient(circle at 40% 35%,#111f2e,#050a10); border-radius:50%; }

    .member-name {
      font-family:'Syne',sans-serif; font-size:1.45rem; font-weight:800;
      background:linear-gradient(115deg,#fff,#d4b0ff);
      -webkit-background-clip:text; background-clip:text; color:transparent;
      line-height:1.15;
    }
    .member-role {
      display:inline-block; font-size:.85rem; font-weight:500; letter-spacing:.8px;
      color:var(--acc2); background:rgba(128,0,96,.18); padding:.25rem 1rem;
      border-radius:40px; margin-top:.45rem; border:.5px solid rgba(128,0,96,.4);
    }
    .member-sub { margin-top:.5rem; font-size:.75rem; color:var(--muted); opacity:.8; }

    .skills-carousel {
      background:rgba(13,31,51,.45); border-radius:1.8rem;
      border:1px solid rgba(128,0,96,.35); padding:1.6rem 0 1.2rem;
      overflow:hidden; position:relative;
      box-shadow:0 8px 24px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.03);
    }
    .carousel-title { display:flex; align-items:center; gap:1.2rem; padding:0 2rem; margin-bottom:1.4rem; }
    .ct-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(128,0,96,.6),rgba(160,32,120,.4)); }
    .ct-line:last-child { background:linear-gradient(90deg,rgba(160,32,120,.4),rgba(128,0,96,.6),transparent); }
    .ct-content { display:flex; align-items:center; gap:.75rem; white-space:nowrap; }
    .ct-label {
      font-family:'Syne',sans-serif; font-size:.95rem; font-weight:800;
      text-transform:uppercase; letter-spacing:3px;
      background:linear-gradient(120deg,#fff 40%,var(--acc2));
      -webkit-background-clip:text; background-clip:text; color:transparent;
    }
    .ct-dot { width:5px; height:5px; border-radius:50%; background:var(--acc2); box-shadow:0 0 8px var(--acc2); animation:pulse-dot 2s ease-in-out infinite; }
    @keyframes pulse-dot { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.6);opacity:.5} }
    .ct-sub { font-size:.78rem; font-weight:400; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); }

    .infinite-carousel {
      position:relative; overflow:hidden;
      mask-image:linear-gradient(to right,transparent,black 6%,black 94%,transparent);
      -webkit-mask-image:linear-gradient(to right,transparent,black 6%,black 94%,transparent);
    }
    .carousel-track {
      display:flex; gap:1.4rem; width:max-content;
      animation:scroll 28s linear infinite; will-change:transform; padding:.4rem 0;
    }
    .infinite-carousel:hover .carousel-track { animation-play-state:paused; }
    @keyframes scroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

    .skill-item {
      display:flex; flex-direction:column; align-items:center; gap:.45rem;
      padding:.9rem 1.4rem; min-width:110px; position:relative;
      transition:transform .22s ease; cursor:default;
    }
    .skill-item::after {
      content:''; position:absolute; bottom:0; left:50%;
      width:0; height:2px;
      background:linear-gradient(90deg,transparent,var(--acc2),transparent);
      transform:translateX(-50%); transition:width .3s ease;
    }
    .skill-item:hover::after { width:80%; }
    .skill-item:hover { transform:translateY(-6px) scale(1.06); }
    .skill-logo { width:48px; height:48px; display:flex; align-items:center; justify-content:center; }
    .skill-logo img { width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 2px 5px rgba(0,0,0,.6)); transition:filter .2s; }
    .skill-item:hover .skill-logo img { filter:drop-shadow(0 0 10px rgba(160,32,120,.7)) brightness(1.15); }
    .skill-name {
      font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.8px;
      background:linear-gradient(135deg,var(--acc2),#ff80d0);
      -webkit-background-clip:text; background-clip:text; color:transparent; white-space:nowrap;
    }
    .carousel-hint { text-align:center; font-size:.68rem; margin-top:1rem; opacity:.45; letter-spacing:.5px; color:var(--muted); }

    @media(max-width:680px){
      .team-section{padding:2rem 1.2rem 1.8rem;border-radius:1.6rem;}
      .circle-frame{width:170px;height:170px;}
      .member-name{font-size:1.2rem;}
      .team-circles{gap:1.8rem;}
    }
  </style>
</head>
<body>
<div class="team-section">

  <div class="team-heading">
    <h2>Núcleo Creativo</h2>
    <div class="sub">Talento &amp; especialización para construir experiencias digitales</div>
  </div>

  <div class="team-circles">
    <div class="member-card">
      <div class="circle-frame">
        <div class="circle-glow"></div>
        <div class="circle-border"></div>
        <div class="circle-orbit"></div>
        <div class="circle-orbit2"></div>
        <div class="photo-placeholder">
          <img src="img/pai.png" alt="Adrián González"
               onerror="this.onerror=null;this.parentElement.innerHTML='<div class=\'no-photo-icon\'>👨‍💻</div>'">
        </div>
      </div>
      <div class="member-name">Adrián<br>González</div>
      <div class="member-role">Programador Web Senior</div>
      <div class="member-sub">full-stack · performance · arquitectura</div>
    </div>

    <div class="member-card">
      <div class="circle-frame">
        <div class="circle-glow"></div>
        <div class="circle-border"></div>
        <div class="circle-orbit"></div>
        <div class="circle-orbit2"></div>
        <div class="photo-placeholder">
          <img src="img/rin.jpg" alt="José Rincón"
               onerror="this.onerror=null;this.parentElement.innerHTML='<div class=\'no-photo-icon\'>🎨✏️</div>'">
        </div>
      </div>
      <div class="member-name">José<br>Rincón</div>
      <div class="member-role">Diseñador Gráfico Senior</div>
      <div class="member-sub">branding · UI/UX · dirección creativa</div>
    </div>
  </div>

  <div class="skills-carousel">
    <div class="carousel-title">
      <div class="ct-line"></div>
      <div class="ct-content">
        <span class="ct-label">Stack Tecnológico</span>
        <span class="ct-dot"></span>
        <span class="ct-sub">Habilidades &amp; Herramientas</span>
      </div>
      <div class="ct-line"></div>
    </div>
    <div class="infinite-carousel">
      <div class="carousel-track" id="track"></div>
    </div>
    <div class="carousel-hint">Hover para pausar</div>
  </div>

</div>
<script>
(function(){
  const skills=[
    {name:'Photoshop',logo:'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/photoshop/photoshop-plain.svg'},
    {name:'HTML5',logo:'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg'},
    {name:'CSS3',logo:'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg'},
    {name:'JavaScript',logo:'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg'},
    {name:'Blender',logo:'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/blender/blender-original.svg'},
    {name:'React',logo:'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/react/react-original.svg'},
    {name:'Python',logo:'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg'},
    {name:'After Effects',logo:'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/aftereffects/aftereffects-original.svg'},
    {name:'Illustrator',logo:'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/illustrator/illustrator-plain.svg'},
    {name:'Node.js',logo:'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/nodejs/nodejs-original.svg'},
    {name:'Shopify',logo:'https://cdn.simpleicons.org/shopify/96bf48'},
    {name:'Figma',logo:'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/figma/figma-original.svg'},
    {name:'WordPress',logo:'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/wordpress/wordpress-plain.svg'},
    {name:'Framer',logo:'https://cdn.simpleicons.org/framer/ffffff'},
    {name:'MySQL',logo:'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/mysql/mysql-original.svg'},
    {name:'Tailwind',logo:'https://cdn.simpleicons.org/tailwindcss/38bdf8'},
    {name:'Git',logo:'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/git/git-original.svg'},
  ];
  const fallback={Photoshop:'🎨',HTML5:'🌐',CSS3:'🎭',JavaScript:'⚡',Blender:'🧊',React:'⚛️',Python:'🐍','After Effects':'🎬',Illustrator:'📐','Node.js':'🗄️',Shopify:'🛍️',Figma:'💎',WordPress:'🌀',Framer:'🔷',MySQL:'🗄️',Tailwind:'🎯',Git:'🌀'};
  function buildItem(s){
    const div=document.createElement('div');
    div.className='skill-item';
    div.innerHTML=`<div class="skill-logo"><img src="${s.logo}" alt="${s.name}" onerror="this.onerror=null;this.outerHTML='<span style=\\'font-size:2rem\\'>${fallback[s.name]||'🔧'}</span>'"></div><div class="skill-name">${s.name}</div>`;
    return div;
  }
  const track=document.getElementById('track');
  [...skills,...skills].forEach(s=>track.appendChild(buildItem(s)));
})();
</script>
</body>
</html>
